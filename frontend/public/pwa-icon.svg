  <circle cx="256" cy="256" r="18" fill="#c9a84c"/>
  <!-- hoja superior izquierda -->
  <path d="M256 256 L100 130" stroke="#c9a84c" stroke-width="28" stroke-linecap="round"/>
  <circle cx="88" cy="122" r="38" fill="none" stroke="#c9a84c" stroke-width="24"/>
  <circle cx="88" cy="122" r="14" fill="#c9a84c"/>
  <!-- hoja inferior izquierda -->
  <path d="M256 256 L100 382" stroke="#c9a84c" stroke-width="28" stroke-linecap="round"/>
  <circle cx="88" cy="390" r="38" fill="none" stroke="#c9a84c" stroke-width="24"/>
  <circle cx="88" cy="390" r="14" fill="#c9a84c"/>
  <!-- hoja superior derecha -->
  <path d="M256 256 L420 160" stroke="#c9a84c" stroke-width="20" stroke-linecap="round" opacity="0.5"/>
  <!-- hoja inferior derecha -->
  <path d="M256 256 L420 352" stroke="#c9a84c" stroke-width="20" stroke-linecap="round" opacity="0.5"/>
